# ─────────────────────────────────────────────────────────────────────────────
#  Docker Compose — nRF52 Factory Erase build services
#
#  Run from the project root:
#    docker compose -f containers/docker-compose.yml run --rm build
#    docker compose -f containers/docker-compose.yml run --rm build \
#      bash scripts/linux/build-nrf52.sh s140_nrf52_611_softdevice
# ─────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:
  build:
    build:
      context: ..
      dockerfile: containers/build/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    volumes:
      - ../release:/workspace/release
    command: ["bash", "scripts/linux/build-nrf52.sh", "all"]
