# ─────────────────────────────────────────────────────────────────────────────
#  CI — nRF52 Factory Erase
#
#  Runs on every push to GitFlow branches (develop, feature/*, release/*,
#  hotfix/*) and on Pull Requests targeting main or develop.
#  Version tags (v*.*.*) are handled by release.yml.
#
#  Steps:
#    1. Compute version with GitVersion (GitFlow/v1 workflow)
#    2. Build both softdevice variants via the Docker build container
#    3. Upload raw firmware artifacts for inspection
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    tags-ignore: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for GitVersion)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Compute version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Show computed version
        run: |
          echo "SemVer    : ${{ steps.gitversion.outputs.semVer }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "Branch    : ${{ steps.gitversion.outputs.branchName }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build firmware via Docker container
        env:
          APP_VERSION: ${{ steps.gitversion.outputs.fullSemVer }}
        run: |
          mkdir -p build release
          docker compose -f containers/docker-compose.yml run --rm build \
            bash scripts/linux/build-nrf52.sh all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-${{ github.sha }}
          path: build/
          if-no-files-found: error
