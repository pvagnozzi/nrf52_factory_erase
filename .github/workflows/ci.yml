# ─────────────────────────────────────────────────────────────────────────────
#  CI — nRF52 Factory Erase
#
#  Runs on every push and pull request (except version tags, handled by
#  release.yml).  Builds both softdevice variants and uploads the raw
#  firmware artifacts as a workflow artifact for inspection.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install --no-cache-dir "platformio==6.1.15"

      - name: Build all environments
        run: bash scripts/linux/build-nrf52.sh all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-${{ github.sha }}
          path: build/
          if-no-files-found: error
