# ─────────────────────────────────────────────────────────────────────────────
#  Bump Build — nRF52 Factory Erase
#
#  Triggered when a Pull Request is merged into 'develop'.
#  Increments the 'build' counter in version.properties and commits it back,
#  so the next CI build on develop carries the bumped build number.
#
#  Commit message includes [skip ci] to avoid re-triggering CI.
# ─────────────────────────────────────────────────────────────────────────────
name: Bump Build

on:
  pull_request:
    types: [closed]
    branches: [develop]

permissions:
  contents: write

jobs:
  bump-build:
    name: Increment build number
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bump build number
        run: python scripts/python/bump_version.py

      - name: Show new version
        run: |
          python scripts/python/buildinfo.py short
          echo "BUILD_VERSION=$(python scripts/python/buildinfo.py short)" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git diff --staged --quiet && echo "No version change needed" && exit 0
          git commit -m "chore: bump build to ${BUILD_VERSION} [skip ci]"
          git push
