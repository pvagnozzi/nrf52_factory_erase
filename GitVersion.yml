# ─────────────────────────────────────────────────────────────────────────────
#  GitVersion — nRF52 Factory Erase
#
#  Uses the built-in GitFlow/v1 workflow for semantic versioning.
#  Branch mapping:
#    main              → {major}.{minor}.{patch}          (release)
#    develop           → {major}.{minor}.{patch}-alpha.N  (integration)
#    feature/*         → {major}.{minor}.{patch}-feature-{name}.N
#    release/*         → {major}.{minor}.{patch}-beta.N
#    hotfix/*          → {major}.{minor}.{patch}-hotfix.N
#    pull-request/*    → {major}.{minor}.{patch}-pr.N
#
#  Docs: https://gitversion.net/docs/reference/configuration
# ─────────────────────────────────────────────────────────────────────────────

workflow: GitFlow/v1

assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
tag-prefix: "v"
major-version-bump-message: "^(feat|refactor)(\\(\\w+\\))?!:|^BREAKING CHANGE"
minor-version-bump-message: "^feat(\\(\\w+\\))?:"
patch-version-bump-message: "^(fix|perf|build|ci)(\\(\\w+\\))?:"

commit-message-incrementing: Enabled

branches:
  main:
    label: ""
    increment: Patch
    prevent-increment:
      of-merged-branch-version: true
      when-branch-merged: false
    track-merge-target: false
    is-release-branch: true
    regex: "^main$"

  develop:
    label: alpha
    increment: Minor
    track-merge-target: true
    regex: "^develop$"

  feature:
    label: "feature-{BranchName}"
    increment: Inherit
    regex: "^feature[/-]"
    source-branches: ["develop"]

  release:
    label: beta
    increment: None
    is-release-branch: true
    regex: "^release[/-]"
    source-branches: ["develop"]

  hotfix:
    label: hotfix
    increment: Patch
    regex: "^hotfix[/-]"
    source-branches: ["main"]

  pull-request:
    label: "pr"
    increment: Inherit
    regex: "^(pull|pull-requests|pr)[/-]"
